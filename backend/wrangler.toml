name = "phdev-api"
main = "src/index.ts"
compatibility_date = "2025-03-01"
compatibility_flags = ["nodejs_compat"]

# D1 Database
[[d1_databases]]
binding = "DB"
database_name = "phstatic-db"
database_id = "81f26061-6195-4717-8ced-98da9214f01d"
migrations_dir = "migrations"

# KV for sessions, rate limiting, and blacklist
[[kv_namespaces]]
binding = "KV"
id = "fed3c38f264e49fb931197f359b5e003"

# R2 for file uploads
[[r2_buckets]]
binding = "UPLOADS"
bucket_name = "phdev-uploads"

[vars]
NODE_ENV = "production"

[env.preview]
name = "phdev-api-preview"
